target-version = "py310"
line-length = 100
indent-width = 4

[lint]
select = [
    "E", "W", "F", "I", "N", "UP", "B", "C4",
    "SIM", "TCH", "ANN", "S", "RUF", "PT",
    "PL", "TRY", "PERF",
]
ignore = [
    "S101",    # assert used in tests
    "TRY003",  # long exception messages are fine
    "PLR0913", # too many args
    "PLR0915", # too many statements in CLI commands
    "ANN401",  # Any allowed where genuinely needed
]

[lint.per-file-ignores]
"tests/**/*.py" = ["ANN", "S", "PLR2004", "TCH", "PLC0415"]
"examples/**/*.py" = ["ANN", "S", "PLC0415"]
"autopsyai/cli.py" = ["PLC0415"]
"autopsyai/core/store.py" = ["TC003"]
"autopsyai/integrations/*.py" = ["PLC0415"]
"autopsyai/analyzers/*.py" = ["PLC0415"]

[lint.isort]
known-first-party = ["autopsyai"]
force-sort-within-sections = true

[lint.flake8-annotations]
allow-star-arg-any = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
